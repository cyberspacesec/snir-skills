name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: auto

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check Go formatting
        run: |
          files="$(git ls-files '*.go')"
          if [ -n "$files" ]; then
            output="$(gofmt -l $files)"
            if [ -n "$output" ]; then
              echo "The following Go files need gofmt:"
              echo "$output"
              exit 1
            fi
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Validate skill bundle
        run: |
          test -f SKILL.md
          grep -q '^name: ' SKILL.md
          grep -q '^description: ' SKILL.md
          test -d references
          test -d scripts
          test -d evals
          test -x scripts/install-snir.sh
          sh -n scripts/install-snir.sh
          jq empty evals/evals.json

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Configure Chrome path
        run: |
          if command -v google-chrome-stable >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v google-chrome-stable)" >> "$GITHUB_ENV"
          elif command -v chromium >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y chromium
            echo "CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
          fi

      - name: Run tests with race detector and coverage
        run: go test -v -race -covermode=atomic -coverprofile=coverage.out ./...
        env:
          # CI runner 无稳定 Chrome，Chrome 集成测试在 -race 下易崩；跳过浏览器依赖测试。
          # 纯单元测试仍全量运行并计入覆盖率。
          SKIP_BROWSER_TESTS: "1"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build packages
        run: go build -v ./...

  cross-build:
    name: Cross Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build snir
        run: go build -v -o "dist/snir-${{ matrix.goos }}-${{ matrix.goarch }}" .
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: snir:ci

  goreleaser-snapshot:
    name: GoReleaser Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - quality
      - test
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set build time
        run: echo "BUILD_TIME=$(date +%H:%M:%S)" >> "$GITHUB_ENV"

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: check

      - name: Build GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TIME: ${{ env.BUILD_TIME }}
