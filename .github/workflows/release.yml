name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GOTOOLCHAIN: auto

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check Go formatting
        run: |
          files="$(git ls-files '*.go')"
          if [ -n "$files" ]; then
            output="$(gofmt -l $files)"
            if [ -n "$output" ]; then
              echo "The following Go files need gofmt:"
              echo "$output"
              exit 1
            fi
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Validate skill bundle
        run: |
          test -f SKILL.md
          grep -q '^name: ' SKILL.md
          grep -q '^description: ' SKILL.md
          test -x scripts/install-snir.sh
          sh -n scripts/install-snir.sh
          jq empty evals/evals.json

      - name: Configure Chrome path
        run: |
          if command -v google-chrome-stable >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v google-chrome-stable)" >> "$GITHUB_ENV"
          elif command -v chromium >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y chromium
            echo "CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        run: go test -v -race ./...

      - name: Build packages
        run: go build -v ./...

  goreleaser:
    name: Build and Publish Release
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set build time
        run: echo "BUILD_TIME=$(date +%H:%M:%S)" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TIME: ${{ env.BUILD_TIME }}

  docker:
    name: Build and Push Docker Image
    needs: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cyberspacesec/snir
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
